<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Alimentación</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
input, select, button { margin: 5px; }
</style>
</head>

<body>

<h2>Login</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>

<hr>

<h2>Registro</h2>

<input id="fecha" type="date">
<input id="hora" type="time">

<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Merienda</option>
<option>Colación</option>
<option>Cena</option>
</select>

<input id="alimento" placeholder="Alimento">

<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>

<button onclick="guardar()">Guardar</button>

<h3>Datos</h3>
<ul id="lista"></ul>

<script>

let userData = null;

async function login(){
 let res = await fetch("/login",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 });

 if(res.ok){
  userData = await res.json();
  cargar();
 } else {
  alert("Login incorrecto");
 }
}

async function register(){
 await fetch("/register",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 });

 alert("Usuario creado");
}

async function guardar(){

 if(!userData){
  alert("Primero hacer login");
  return;
 }

 await fetch("/add",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    user_id:userData.id,
    fecha:fecha.value,
    hora:hora.value,
    periodo:periodo.value,
    alimento:alimento.value,
    tipo:tipo.value
  })
 });

 cargar();
}

async function cargar(){

 let res = await fetch(`/data/${userData.id}`);
 let data = await res.json();

 lista.innerHTML = "";

 data.forEach(d=>{
  lista.innerHTML += `
    <li>${d.fecha} ${d.hora} - ${d.alimento} (${d.tipo})</li>
  `;
 });
}

</script>

</body>
</html>
