<style>

input,select{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:1px solid #ccc}
button{width:100%;padding:10px;margin-top:5px;border:none;border-radius:8px;background:#305496;color:white}

.sug div{padding:6px;cursor:pointer}
.sug div:hover{background:#eee}
.kpi{padding:8px;border-radius:6px;color:white;text-align:center;margin-top:5px}
.blue{background:#305496}
.green{background:#4CAF50}
.orange{background:#FFA500}
video{width:100%;border-radius:8px}
.receta img{width:100%;border-radius:6px;margin-top:5px}
</style>

</div>

<option>Almuerzo</option>
