<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutricionista PRO MAX</title>

<!-- ✅ SCRIPTS CORRECTOS (ESTO ERA EL ERROR ANTES) -->
<script src="https://cdn.jsdelivr.net/npm/@js</script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{
  font-family:Segoe UI;
  background:#f4f6fb;
  margin:0;
}

.container{
  max-width:420px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  border-radius:16px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

button{
  width:100%;
  background:#305496;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  margin-top:8px;
}

.btn-row{
  display:flex;
  gap:5px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
}

video{
  width:100%;
  border-radius:10px;
}

.topbar{
  background:#305496;
  color:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}
</style>

</head>

<body>

<div class="container">

<div id="topbar" class="topbar" style="display:none;">
<span id="usuario"></span>
<button onclick="logout()">Salir</button>
</div>

<h2>🥗 Nutricionista PRO MAX</h2>

<!-- LOGIN -->
<div id="loginCard" class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
<b>📷 Cámara</b>
<video id="video" autoplay playsinline></video>
<button onclick="startCamera()">Activar cámara</button>
<button onclick="switchCam()">Cambiar cámara</button>
</div>

<div class="card">
<input id="resultado" placeholder="Alimento">
<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>
<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Cena</option>
<option>Merienda</option>
<option>Colación</option>
</select>
<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<div id="lista"></div>
</div>

</div>

</div>

<script>

let userData=null;
let model=null;
let stream=null;
let frontal=false;
let intervalo=null;

/* ✅ IA */
mobilenet.load().then(m=> model=m);

/* ✅ LOGIN */
async function login(){

 const res = await fetch("/login",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 });

 if(!res.ok){
  alert("Error login");
  return;
 }

 userData = await res.json();

 usuario.innerText="👤 "+userData.username;

 loginCard.style.display="none";
 app.style.display="block";
 topbar.style.display="flex";

 cargar();
}

/* ✅ REGISTER */
