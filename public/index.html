<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutricionista PRO MAX</title>

<!-- ✅ SCRIPTS BIEN ESCRITOS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfc="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobil
body{font-family:Segoe UI;background:#f4f6fb;margin:0}
.container{max-width:420px;margin:auto;padding:15px}
.card{
 background:white;
 border-radius:16px;
 padding:18px;
 margin-bottom:15px;
 box-shadow:0 8px 25px rgba(0,0,0,.08);
}
button{
 width:100%;
 background:#305496;
 color:white;
 border:none;
 padding:12px;
 border-radius:10px;
 margin-top:8px;
}
.btn2{width:48%}
input,select{
 width:100%;
 padding:10px;
 margin-top:8px;
 border-radius:10px;
 border:1px solid #ccc;
}
video{width:100%;border-radius:10px}
.topbar{
 display:flex;justify-content:space-between;
 background:#305496;color:white;
 padding:10px;border-radius:10px;
 margin-bottom:10px;
}
.manual{border:2px solid #4CAF50!important;}
</style>

</head>

<body>

<div class="container">

<div id="topbar" class="topbar" style="display:none;">
<span id="usuario"></span>
<button onclick="logout()">Salir</button>
</div>

<h2>🥗 Nutricionista PRO MAX</h2>

<div id="loginCard" class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>
</div>

<div id="app" style="display:none;">

<div class="card">
<b>📷 Cámara</b>
<video id="video" autoplay playsinline></video>
<button onclick="startCamera()">Activar cámara</button>
<button onclick="switchCam()">Cambiar cámara</button>
</div>

<div class="card">
<input id="resultado" placeholder="Alimento">
<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>
<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Cena</option>
<option>Merienda</option>
<option>Colación</option>
</select>
<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<div id="lista"></div>
</div>

</div>

</div>

<script>

let userData=null
let model
let stream
let frontal=false

let modoManual=false

// ✅ MODELO IA
mobilenet.load().then(m=>model=m)

// ✅ INPUT MANUAL
resultado.addEventListener("input",()=>{
 modoManual=true
 resultado.classList.add("manual")
})

// ✅ LOGIN
async function login(){

 let r=await fetch("/login",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 });

 if(!r.ok){
  alert("Error login")
  return
 }

 userData=await r.json()

 usuario.innerText="👤 "+userData.username
 loginCard.style.display="none"
 app.style.display="block"
 topbar.style.display="flex"

 cargar()
}

// ✅ REGISTER
async function register(){
 await fetch("/register",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 });
 alert("Usuario creado")
}

// ✅ LOGOUT
function logout(){location.reload()}


// ✅ CÁMARA
async function startCamera(){

 if(stream) stream.getTracks().forEach(t=>t.stop())

 stream=await navigator.mediaDevices.getUserMedia({
  video:{facingMode:frontal?"user":"environment"}
 })

 video.srcObject=stream

 detectar()
}

function switchCam(){
 frontal=!frontal
 startCamera()
}


// ✅ IA
function map(txt){

 txt=txt.toLowerCase()

 if(txt.includes("pizza")) return "pizza"
 if(txt.includes("burger")) return "hamburguesa"
 if(txt.includes("chicken")) return "pollo"
 if(txt.includes("salad")) return "ensalada"

 return "comida"
}

function detectar(){

 setInterval(async ()=>{

  if(!model) return
  if(modoManual) return

  let p=await model.classify(video)

  resultado.value=map(p[0].className)

 },1500)
}


// ✅ CRUD
async function guardar(){

 await fetch("/add",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   user_id:userData.id,
   fecha:new Date().toLocaleDateString(),
   alimento:resultado.value,
   tipo:tipo.value,
   periodo:periodo.value
  })
 })

 modoManual=false
 resultado.classList.remove("manual")

 cargar()
}

async function borrar(id){

 if(confirm("Eliminar?")){
  await fetch("/delete",{
   method:"POST",
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({id})
  })
  cargar()
 }
}

async function editar(d){

 let nuevo=prompt("Editar",d.alimento)
 if(!nuevo) return

 await fetch("/update",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   id:d.id,
   alimento:nuevo,
   tipo:d.tipo,
   periodo:d.periodo
  })
 })

 cargar()
}


// ✅ LOAD
async function cargar(){

 let r=await fetch(`/data/${userData.id}`)
 let data=await r.json()

 lista.innerHTML=""

 data.forEach(d=>{
  lista.innerHTML+=`
  <div class="card">
   <b>${d.alimento}</b><br>
   ${d.tipo} - ${d.periodo}<br>
   <button class="btn2" onclick='editar(${JSON.stringify(d)})'>✏️</button>
   <button class="btn2" onclick='borrar(${d.id})'>🗑</button>
  </div>
  `
 })
}

</script>

</body>
</html>
