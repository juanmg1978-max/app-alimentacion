<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nutricionista PRO MAX</title>

<style>
body{font-family:Segoe UI;background:#edf1f7;margin:0}
.container{max-width:420px;margin:auto;padding:15px}

.card{
 background:white;
 border-radius:12px;
 padding:12px;
 margin-bottom:10px;
 box-shadow:0 4px 12px rgba(0,0,0,.08)
}

button{
 width:100%;
 background:#305496;
 color:white;
 padding:10px;
 border:none;
 border-radius:8px;
 margin-top:5px
}

input,select{
 width:100%;
 padding:8px;
 margin-top:5px;
 border-radius:6px;
 border:1px solid #ccc
}

.sugerencias{
 background:white;
 border:1px solid #ccc;
 border-radius:6px;
 max-height:150px;
 overflow:auto
}

.sugerencias div{
 padding:6px;
 cursor:pointer
}

.sugerencias div:hover{
 background:#eee
}

.kpi{padding:8px;margin-top:6px;border-radius:6px;text-align:center;color:white}
.blue{background:#305496}
.green{background:#4CAF50}
.orange{background:#FFA500}

.receta img{
 width:100%;
 border-radius:8px;
 margin-top:5px
}
</style>
</head>

<body>

<div class="container">

<div id="loginCard" class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>
</div>

<div id="app" style="display:none">

<div class="card">

<input id="fecha" type="date">
<input id="hora" type="time">

<input id="resultado" placeholder="Ej: carne papas milanesa..." oninput="autocompleteAI()">
<div id="sug" class="sugerencias"></div>

<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>

<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Cena</option>
</select>

<input id="objetivo" type="number" value="2000">

<div class="kpi blue">Kcal <span id="kcal">0</span></div>
<div class="kpi green">Objetivo <span id="obj">2000</span></div>
<div class="kpi orange">Balance <span id="balance">0</span></div>

<button onclick="guardar()">Guardar</button>

</div>

<!-- RECETAS PRO -->
<div class="card">
<b>🍳 Recetas sugeridas</b>
<div id="recetas"></div>
</div>

<!-- HISTORIAL -->
<div id="lista"></div>

</div>

</div>

<script>

let userData,data=[]

/* ===== BASE PLATOS ===== */

const platos={
"milanesa":400,
"milanesa con papas":550,
"pollo al horno":300,
"carne con papas":450,
"guiso de carne":500,
"pizza muzzarella":300,
"hamburguesa completa":600,
"pasta con salsa":500,
"paella":500
}

/* ===== RECETAS PRO (con imagen + link) ===== */

const recetasDB={

"carne con papas":{
 img:"https://images.unsplash.com/photo-1604908177522-429cc5bf38b4",
 link:"https://www.recetasgratis.net/receta-de-carne-con-papas-51354.html"
},

"guiso de carne":{
 img:"https://images.unsplash.com/photo-1617196038435-c3da94c02010",
 link:"https://www.recetasgratis.net/receta-de-guiso-de-carne-51072.html"
},

"pollo al horno":{
 img:"https://images.unsplash.com/photo-1588167056120-3a51e2c10b20",
 link:"https://www.recetasgratis.net/receta-de-pollo-al-horno-51601.html"
},

"milanesa":{
 img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092",
 link:"https://www.recetasgratis.net/receta-de-milanesas-53304.html"
},

"pizza muzzarella":{
 img:"https://images.unsplash.com/photo-1548365328-9f547fb0953d",
 link:"https://www.recetasgratis.net/receta-de-pizza-casera-212.html"
}

}

/* ===== AUTOCOMPLETE IA ===== */

function autocompleteAI(){

 let txt=resultado.value.toLowerCase()

 let html=""

 Object.keys(platos)
 .filter(p=>p.includes(txt))
 .forEach(p=>{
  html+=`<div onclick="select('${p}')">${p}</div>`
 })

 if(txt.includes("carne") && txt.includes("papa"))
  html+=`<div onclick="select('carne con papas')">carne con papas</div>`

 sug.innerHTML=html
}

function select(x){
 resultado.value=x
 sug.innerHTML=""
 actualizar()
}

/* ===== LOGIN ===== */

async function login(){
 let r=await fetch("/login",{method:"POST",
 headers:{'Content-Type':'application/json'},
 body:JSON.stringify({username:user.value,password:pass.value})
 })
 userData=await r.json()
 loginCard.style.display="none"
 app.style.display="block"
 cargar()
}

async function register(){
 await fetch("/register",{method:"POST",
 headers:{'Content-Type':'application/json'},
 body:JSON.stringify({username:user.value,password:pass.value})
 })
 alert("Usuario creado")
}

/* ===== CALCULO ===== */

function calcKcal(x){
 return platos[x] || 200
}

function actualizar(){

 let total=0

 data.forEach(d=>{
  total+=calcKcal(d.alimento)
 })

 total+=calcKcal(resultado.value)

 let objVal=parseInt(objetivo.value)||2000

 kcal.innerText=total
 obj.innerText=objVal

 let bal=objVal-total

 balance.innerText = bal>0
  ? "Déficit "+bal
  : "Exceso "+Math.abs(bal)

 generarRecetas()
}

/* ===== RECETAS CON IMAGEN ===== */

function generarRecetas(){

 let txt=resultado.value.toLowerCase()

 let html=""

 Object.keys(recetasDB).forEach(r=>{

  if(txt.includes(r.split(" ")[0]) ){

    html+=`
    <div class="receta card">
      <b>${r}</b><br>
      <img src="${recetasDB[r]. <a href="${recetasDB[r].linkta completa</a>
    </div>
    `
  }

 })

 if(!html) html="No hay recetas específicas, probar combinaciones"

 recetas.innerHTML=html
}

/* ===== CRUD ===== */

async function guardar(){

 await fetch("/add",{method:"POST",
 headers:{'Content-Type':'application/json'},
 body:JSON.stringify({
  user_id:userData.id,
  fecha:fecha.value,
  hora:hora.value,
  alimento:resultado.value
 })
 })

 resultado.value=""
 cargar()
}

async function cargar(){

 let r=await fetch(`/data/${userData.id}`)
 data=await r.json()

 lista.innerHTML=data.map(d=>`
 <div class="card">
   ${d.fecha} ${d.hora}<br>
   ${d.alimento}
 </div>
 `).join("")

 actualizar()
}

</script>

</body>
</html>
