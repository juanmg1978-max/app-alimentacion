<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutricionista PRO MAX</title>

<!-- ✅ SCRIPTS CORRECTOS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjsript src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{font-family:Segoe UI;background:#f4f6fb;margin:0}
.container{max-width:420px;margin:auto;padding:15px}
.card{background:white;border-radius:16px;padding:18px;margin-bottom:15px;box-shadow:0 8px 20px rgba(0,0,0,.08);}
button{width:100%;background:#305496;color:white;border:none;padding:12px;border-radius:10px;margin-top:8px;}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #ccc;}
video{width:100%;border-radius:10px}
.topbar{display:flex;justify-content:space-between;background:#305496;color:white;padding:10px;border-radius:10px;margin-bottom:10px;}
</style>
</head>

<body>

<div class="container">

<div id="topbar" class="topbar" style="display:none;">
<span id="usuario"></span>
<button onclick="logout()">Salir</button>
</div>

<h2>🥗 Nutricionista PRO MAX</h2>

<div id="loginCard" class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>
</div>

<div id="app" style="display:none;">

<div class="card">
<b>📷 Cámara</b>
<video id="video" autoplay playsinline></video>
<button onclick="startCamera()">Activar cámara</button>
<button onclick="switchCam()">Cambiar cámara</button>
</div>

<div class="card">
<input id="resultado" placeholder="Alimento">
<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>
<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Cena</option>
<option>Merienda</option>
<option>Colación</option>
</select>
<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<div id="lista"></div>
</div>

</div>

</div>

<script>

let userData=null;
let model;
let stream;
let frontal=false;

mobilenet.load().then(m=> model = m);

/* LOGIN */
async function login(){

 let res = await fetch("/login",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 });

 if(!res.ok){
  alert("Error login");
  return;
 }

 userData = await res.json();

 usuario.innerText="👤 "+userData.username;

 loginCard.style.display="none";
 app.style.display="block";
 topbar.style.display="flex";

 cargar();
}

/* REGISTER */
async function register(){

 let res = await fetch("/register",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 });

 if(!res.ok){
  alert("Error al crear usuario");
  return;
 }

 alert("Usuario creado");
}

function logout(){
 location.reload();
}

/* CAMARA */
async function startCamera(){

 if(stream){
  stream.getTracks().forEach(t=>t.stop());
 }

 stream = await navigator.mediaDevices.getUserMedia({
  video:{facingMode:frontal ? "user":"environment"}
 });

 video.srcObject = stream;
}

function switchCam(){
 frontal = !frontal;
 startCamera();
}

/* CRUD */
async function guardar(){

 await fetch("/add",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   user_id:userData.id,
   fecha:new Date().toLocaleDateString(),
   alimento:resultado.value,
   tipo:tipo.value,
   periodo:periodo.value
  })
 });

 cargar();
}

/* LOAD */
async function cargar(){

 let res = await fetch(`/data/${userData.id}`);
 let data = await res.json();

 lista.innerHTML="";

 data.forEach(d=>{
  lista.innerHTML+=`
    <div class="card">
      <b>${d.alimento}</b><br>
      ${d.tipo} - ${d.periodo}
    </div>
  `;
 });
}

</script>

</body>
</html>
