<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutricionista PRO MAX</title>

<!-- ✅ SCRIPTS CORRECTOS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{font-family:Segoe UI;background:#edf1f7;margin:0}
.container{max-width:420px;margin:auto;padding:15px}
.card{background:white;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
button{width:100%;background:#305496;color:white;padding:10px;border:none;border-radius:8px;margin-top:5px}
input,select{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:1px solid #ccc}
video,canvas{width:100%;border-radius:10px}
.kpi{padding:8px;margin-top:5px;border-radius:8px;color:white;text-align:center}
.blue{background:#305496}
.green{background:#4CAF50}
.orange{background:#FFA500}
.red{background:#ff4d4d}
</style>
</head>

<body>

<div class="container">

<div id="loginCard" class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>
</div>

<div id="app" style="display:none;">

<!-- CAMARA -->
<div class="card">
<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<button onclick="startCamera()">Activar cámara</button>
<button onclick="switchCam()">Cambiar cámara</button>
<button onclick="capturar()">📸 Sacar foto</button>
</div>

<!-- REGISTRO -->
<div class="card">

<input id="resultado" placeholder="Alimento">

<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>

<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Cena</option>
<option>Merienda</option>
<option>Colación</option>
</select>

<input id="objetivo" type="number" value="2000">

<div class="kpi blue">Kcal día <span id="kcal">0</span></div>
<div class="kpi green">Objetivo <span id="obj">2000</span></div>
<div class="kpi orange">Balance <span id="balance">0</span></div>
