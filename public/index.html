<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutricionista IA PRO MAX</title>

<!-- ✅ SCRIPTS CORRECTOS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/t<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef2f7;margin:0}
.container{max-width:600px;margin:auto;padding:10px}
.card{background:white;padding:15px;margin-bottom:10px;border-radius:10px}

video{width:100%;border-radius:10px}
button{width:100%;padding:10px;margin-top:5px}

.topbar{
 background:#305496;
 color:white;
 padding:10px;
 display:flex;
 justify-content:space-between;
 border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<div id="topbar" class="topbar" style="display:none;">
<span id="usuario"></span>
<button onclick="logout()">Salir</button>
</div>

<h2>🥗 Nutricionista IA PRO MAX</h2>

<!-- LOGIN -->
<div id="loginCard" class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<div class="card">
<button onclick="startCamera()">📷 Activar cámara</button>
<video id="video" autoplay muted></video>
</div>

<div class="card">
<input id="resultado" placeholder="Resultado IA">
<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>
<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Cena</option>
<option>Merienda</option>
<option>Colación</option>
</select>
<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<div id="lista"></div>
</div>
</div>

</div>

<script>

let userData=null;
let model;

// LOGIN
async function login(){

 let res = await fetch("/login",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 });

 if(res.ok){
  userData = await res.json();

  usuario.innerText="👤 "+userData.username;

  loginCard.style.display="none";
  app.style.display="block";
  topbar.style.display="flex";

  cargar();
 }else{
  alert("Login incorrecto");
 }
}

// REGISTER
async function register(){
 await fetch("/register",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 });

 alert("Usuario creado");
}

function logout(){
 location.reload();
}

// IA
mobilenet.load().then(m => model=m);

// CÁMARA
async function startCamera(){
 let stream=await navigator.mediaDevices.getUserMedia({video:true});
 video.srcObject=stream;
}

// GUARDAR
async function guardar(){
 await fetch("/add",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    user_id:userData.id,
    fecha:new Date().toLocaleDateString(),
    alimento:resultado.value,
    tipo:tipo.value,
    periodo:periodo.value
  })
 });

 cargar();
}

// CARGAR
async function cargar(){

 let res=await fetch(`/data/${userData.id}`);
 let data=await res.json();

 lista.innerHTML="";
 data.forEach(d=>{
  lista.innerHTML+=`<div>${d.fecha} - ${d.alimento}</div>`;
 });
}

</script>

</body>
</html>
