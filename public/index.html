<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Alimentación IA PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef2f7;margin:0}
.container{max-width:500px;margin:auto;padding:10px}

.card{
 background:white;
 padding:15px;
 border-radius:12px;
 margin-bottom:15px;
 box-shadow:0 4px 12px rgba(0,0,0,.08)
}

input,select,button{
 width:100%;
 padding:12px;
 margin:5px 0;
 border-radius:8px;
 border:1px solid #ccc;
 font-size:16px
}

button{background:#305496;color:white;border:none}

.kpi{padding:10px;margin:5px 0;border-radius:8px;color:white;text-align:center}
.blue{background:#305496}
.red{background:#ff4d4d}
.green{background:#4CAF50}
</style>
</head>

<body>

<div class="container">

<h2>🍽️ App Alimentación IA PRO</h2>

<div class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>
</div>

<div class="card">

<input id="fecha" type="date">
<input id="hora" type="time">

<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Merienda</option>
<option>Colación</option>
<option>Cena</option>
</select>

<input id="alimento" placeholder="Alimento">

<!-- NUEVO -->
<input id="porcion" type="number" placeholder="Cantidad (gramos ej: 100)">

<input type="file" id="foto" accept="image/*">

<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>

<button onclick="guardar()">Guardar</button>

</div>

<div class="card">
<div class="kpi blue">Total <span id="total">0</span></div>
<div class="kpi red">Ansiedad <span id="ansiedad">0</span></div>
<div class="kpi green">% <span id="pct">0%</span></div>
</div>

<div class="card">
<div id="lista"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<script>

let userData=null;
let data=[];
let chart;

// 🔥 IA CALORÍAS REAL (API)
async function obtenerCalorias(alimento){

 try{
  let res=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${alimento}&search_simple=1&action=process&json=1`);
  let json=await res.json();

  if(json.products && json.products.length>0){
    let kcal=json.products[0].nutriments?.energy-kcal_100g
    return kcal || 180;
  }

 }catch(e){}

 return 180;
}

// 📷 IA FOTO (simulada robusta)
function detectarPorImagen(){
 let archivo=foto.files[0];
 if(!archivo) return null;

 let nombre=archivo.name.toLowerCase();

 if(nombre.includes("pizza")) return "pizza";
 if(nombre.includes("pollo")) return "pollo";
 if(nombre.includes("ensalada")) return "ensalada";

 return null;
}

async function login(){
 let res=await fetch("/login",{method:"POST",
 headers:{'Content-Type':'application/json'},
 body:JSON.stringify({username:user.value,password:pass.value})})

 if(res.ok){
  userData=await res.json();
  alert("Login OK");
  cargar();
 }
}

async function register(){
 await fetch("/register",{method:"POST",
 headers:{'Content-Type':'application/json'},
 body:JSON.stringify({username:user.value,password:pass.value})})

 alert("Usuario creado");
}

// 💥 FUNCIÓN PRINCIPAL PRO
async function guardar(){

 if(!userData){
  alert("Login primero");
  return;
 }

 let alimentoTxt=alimento.value;

 // 📷 detectar desde imagen
 let detectado=detectarPorImagen();
 if(detectado){
  alimentoTxt=detectado;
 }

 let kcal=await obtenerCalorias(alimentoTxt);

 let gramos=porcion.value || 100;
 let kcalFinal=Math.round((kcal*gramos)/100);

 await fetch("/add",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   user_id:userData.id,
   fecha:fecha.value,
   hora:hora.value,
   periodo:periodo.value,
   alimento:`${alimentoTxt} (${kcalFinal} kcal)`,
   tipo:tipo.value
  })
 });

 alert("✅ Guardado inteligente");
 cargar();
}

// render
async function cargar(){
 let res=await fetch(`/data/${userData.id}`);
 data=await res.json();
 render();
}

function render(){

 lista.innerHTML="";

 let ansiedad=0;
 let counts={Hambre:0,Ansiedad:0,Otros:0};

 data.forEach(d=>{
  lista.innerHTML+=`<div>${d.fecha} ${d.hora} - ${d.alimento}</div>`;

  if(d.tipo==="Ansiedad") ansiedad++;
  counts[d.tipo]++;
 });

 total.innerText=data.length;
 document.getElementById("ansiedad").innerText=ansiedad;

 let pct=data.length?Math.round(ansiedad/data.length*100):0;
 document.getElementById("pct").innerText=pct+"%";

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById("chart"),{
  type:"bar",
  data:{
   labels:["Hambre","Ansiedad","Otros"],
   datasets:[{data:[counts.Hambre,counts.Ansiedad,counts.Otros]}]
  }
 });
}

</script>

</body>
</html>
