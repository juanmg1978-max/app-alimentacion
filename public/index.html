<style>
body{
  font-family:Segoe UI;
  background:#eef2f7;
  margin:0;
}

/* CONTENEDOR */
.container{
  max-width:1100px;
  margin:20px auto;
}

/* CARDS */
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

/* INPUTS */
input,select,button{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  width:100%;
}

button{
  background:#305496;
  color:white;
  border:none;
  cursor:pointer;
}

/* TABLA */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #ddd;
}

th{
  background:#305496;
  color:white;
}

/* SEMAFORO */
.tipo-Ansiedad{background:#ff4d4d;color:white}
.tipo-Hambre{background:#4CAF50;color:white}
.tipo-Otros{background:#FFD966}

/* DASHBOARD */
.dashboard{
  display:flex;
  gap:20px;
}

.kpi{
  flex:1;
  text-align:center;
  padding:20px;
  border-radius:10px;
  font-size:18px;
}
