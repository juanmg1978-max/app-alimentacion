<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Alimentación IA REAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef2f7;margin:0}
.container{max-width:500px;margin:auto;padding:10px}

.card{
 background:white;
 padding:15px;
 border-radius:12px;
 margin-bottom:15px;
 box-shadow:0 4px 12px rgba(0,0,0,.08)
}

input,select,button{
 width:100%;
 padding:12px;
 margin:5px 0;
 border-radius:8px;
 border:1px solid #ccc;
 font-size:16px
}

button{background:#305496;color:white;border:none}

.kpi{padding:10px;margin:5px 0;border-radius:8px;color:white;text-align:center}
.blue{background:#305496}
.red{background:#ff4d4d}
.green{background:#4CAF50}

.suggestion{
 background:#ddd;
 padding:5px;
 border-radius:6px;
 display:inline-block;
 margin:2px;
 cursor:pointer
}
</style>
</head>

<body>

<div class="container">

<h2>🍽️ IA Alimentación REAL</h2>

<div class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>
</div>

<div class="card">

<input id="fecha" type="date">
<input id="hora" type="time">

<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Merienda</option>
<option>Colación</option>
<option>Cena</option>
</select>

<input id="alimento" placeholder="Alimento" oninput="sugerir()">

<div id="sugerencias"></div>

<input type="file" id="foto" accept="image/*">

<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>

<button onclick="guardar()">Guardar</button>

</div>

<div class="card">
<div class="kpi blue">Total <span id="total">0</span></div>
<div class="kpi red">Ansiedad <span id="ansiedad">0</span></div>
<div class="kpi green">% <span id="pct">0%</span></div>
</div>

<div class="card">
<div id="lista"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<script>

let userData=null
let data=[]

// 🧠 IA DETECCIÓN SIN API
function detectarPorImagen(file){

 if(!file) return null

 let nombre=file.name.toLowerCase()
 let size=file.size

 if(nombre.includes("pizza")) return "pizza"
 if(nombre.includes("burger")||nombre.includes("hamb")) return "hamburguesa"
 if(nombre.includes("pollo")) return "pollo"
 if(nombre.includes("ensalada")) return "ensalada"
 if(nombre.includes("cafe")) return "cafe"

 // fallback heurístico según tamaño
 if(size > 2000000) return "plato grande"
 if(size > 1000000) return "comida media"
 return "snack"
}
