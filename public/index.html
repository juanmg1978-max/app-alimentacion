<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutricionista PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
body{
 font-family:Segoe UI;
 background:#eef2f7;
 margin:0;
}

.container{
 max-width:500px;
 margin:auto;
 padding:10px;
}

.card{
 background:white;
 padding:15px;
 border-radius:12px;
 box-shadow:0 4px 12px rgba(0,0,0,.1);
 margin-bottom:15px;
}

button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:8px;
 background:#305496;
 color:white;
 font-size:16px;
 margin-top:5px;
}

input,select{
 width:100%;
 padding:10px;
 margin-top:5px;
 border-radius:8px;
 border:1px solid #ccc;
}

.topbar{
 background:#305496;
 color:white;
 padding:10px;
 display:flex;
 justify-content:space-between;
 border-radius:10px;
 margin-bottom:10px;
}

video{
 width:100%;
 border-radius:10px;
 margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div id="topbar" class="topbar" style="display:none;">
<span id="usuario"></span>
<button onclick="logout()">Salir</button>
</div>

<h2>🥗 Nutricionista PRO</h2>

<!-- LOGIN -->
<div id="loginCard" class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crear usuario</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
<button onclick="startCamera()">📷 Activar cámara</button>
<button onclick="switchCamera()">🔄 Cambiar cámara</button>
<video id="video" autoplay playsinline></video>
</div>

<div class="card">
<input id="resultado" placeholder="Resultado IA">

<select id="tipo">
<option>Hambre</option>
<option>Ansiedad</option>
<option>Otros</option>
</select>

<select id="periodo">
<option>Desayuno</option>
<option>Almuerzo</option>
<option>Cena</option>
<option>Merienda</option>
<option>Colación</option>
</select>

<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<h3>Historial</h3>
<div id="lista"></div>
</div>

</div>

</div>

<script>

let userData=null;
let model;
let stream;
let usandoFrontal=false;

/* LOGIN */
async function login(){

 let res=await fetch("/login",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   username:user.value,
   password:pass.value
  })
 });

 if(res.ok){
  userData=await res.json();
  usuario.innerText="👤 "+userData.username;

  loginCard.style.display="none";
  app.style.display="block";
  topbar.style.display="flex";

  cargar();
 }else{
  alert("Login incorrecto");
 }
}

/* REGISTER */
async function register(){
 await fetch("/register",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   username:user.value,
   password:pass.value
  })
 });

 alert("Usuario creado");
}

function logout(){ location.reload(); }

/* IA */
mobilenet.load().then(m => model=m);

/* CAMARA TRASERA */
async function startCamera(){

 if(stream) detener();

 stream = await navigator.mediaDevices.getUserMedia({
  video:{
   facingMode: usandoFrontal ? "user" : "environment"
  }
 });

 video.srcObject=stream;

 detectarAuto();
}

/* CAMBIAR CAMARA */
function switchCamera(){
 usandoFrontal = !usandoFrontal;
 startCamera();
}

/* DETENER */
function detener(){
 stream.getTracks().forEach(t=>t.stop());
}

/* IA AUTOMATICA */
function detectarAuto(){

 setInterval(async ()=>{

  if(!model || !video.videoWidth) return;

  let pred = await model.classify(video);

  let alimentos=[];

  pred.forEach(p=>{
   let n=p.className.toLowerCase();

   if(n.includes("pizza")) alimentos.push("pizza");
   if(n.includes("burger")) alimentos.push("hamburguesa");
   if(n.includes("salad")) alimentos.push("ensalada");
   if(n.includes("banana")) alimentos.push("banana");
   if(n.includes("chicken")) alimentos.push("pollo");
  });

  if(alimentos.length){
    resultado.value=alimentos.join("+");
  }

 },2000);
}

/* GUARDAR */
async function guardar(){

 await fetch("/add",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   user_id:userData.id,
   fecha:new Date().toLocaleDateString(),
   alimento:resultado.value,
   tipo:tipo.value,
   periodo:periodo.value
  })
 });

 cargar();
}

/* CARGAR */
async function cargar(){

 let res=await fetch(`/data/${userData.id}`);
 let data=await res.json();

 lista.innerHTML="";

 data.forEach(d=>{
  lista.innerHTML+=`
  <div style="background:#f5f5f5;padding:8px;margin:5px;border-radius:8px">
   ${d.fecha} - ${d.alimento}
  </div>`;
 });
}

</script>

</body>
</html>
``
